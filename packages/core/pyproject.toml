[tool.poetry]
name = "camou-core"
version = "0.1.0"
description = "Shared models and utilities (to be implemented)"
authors = ["Ghost Browsers <ops@ghost.local>"]
packages = [{ include = "core" }]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
pydantic = "^2.8.2"
httpx = "^0.27.2"
anyio = "^4.4.0"
websockets = "^12.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.2"
ruff = "^0.6.9"
pytest-cov = "^5.0.0"

[tool.pytest.ini_options]
addopts = "--strict-markers --maxfail=1"
testpaths = ["tests"]

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"
