name: ui-tests

on:
  pull_request:
    paths:
      - 'apps/ui/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ui-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/ui/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/ui-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint UI
        run: pnpm -C apps/ui lint
      - name: Run UI tests
        run: pnpm -C apps/ui test
