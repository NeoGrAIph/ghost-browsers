name: build-camoufox-worker
on:
  workflow_dispatch:
    inputs:
      worker_tag:
        description: "Tag worker образа (пример: dev)"
        required: true
      camoufox_py_version:
        description: "Версия Python-пакета camoufox (пример: 0.9.3)"
        required: false
  push:
    paths:
      - "services/camoufox_worker/Dockerfile"
      - "services/camoufox_worker/smoke.py"
      - "services/camoufox_worker/**.py"
      - ".github/workflows/docker-worker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/camoufox_worker/Dockerfile
          push: true
          tags: ghcr.io/${{ toLower(github.repository_owner) }}/camoufox-worker:${{ inputs.worker_tag || github.sha }}
          build-args: |
            CAMOUFOX_PY_VERSION=${{ inputs.camoufox_py_version }}
