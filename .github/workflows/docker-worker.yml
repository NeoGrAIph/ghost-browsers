name: build-camoufox-worker
on:
  workflow_dispatch:
    inputs:
      worker_tag:
        description: "Tag worker образа (пример: dev)"
        required: true
      camoufox_py_version:
        description: "Версия Python-пакета camoufox (пример: 0.9.3)"
        required: false
  push:
    paths:
      - "services/camoufox_worker/Dockerfile"
      - "services/camoufox_worker/smoke.py"
      - "services/camoufox_worker/**.py"
      - "services/camoufox_worker/bin/**"
      - "services/camoufox_worker/pyproject.toml"
      - "services/camoufox_worker/poetry.lock"
      - ".github/workflows/docker-worker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ghcr.io/${{ toLower(github.repository_owner) }}/camoufox-worker:${{ inputs.worker_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/camoufox_worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REF }}
          build-args: |
            CAMOUFOX_PY_VERSION=${{ inputs.camoufox_py_version }}
      - name: Smoke test entrypoint
        run: |
          set -euo pipefail
          docker pull "$IMAGE_REF"
          docker run --rm "$IMAGE_REF" -- --help
          docker run --rm \
            -e WORKER_JOB_URL=https://example.com \
            -e WORKER_MODE=native \
            -e WORKER_EXTRA_ARGS="--help" \
            "$IMAGE_REF"
